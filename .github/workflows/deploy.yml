name: Deploy

# Runs the test suite on every push/PR; deploys to the VPS only on pushes to
# main, and only if tests pass. Deploy step SSHes in, resets the checkout on
# the server to match origin/main exactly, and rebuilds the stack in place.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Stockfish
        run: sudo apt-get update && sudo apt-get install -y stockfish

      - name: Run backend tests
        run: uv run pytest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Frontend build check
        working-directory: frontend
        run: npm run build

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_PATH }}
            git fetch origin main
            git reset --hard origin/main
            docker compose up --build -d --remove-orphans
            docker image prune -f
            sleep 5
            curl -f http://localhost/api/health
