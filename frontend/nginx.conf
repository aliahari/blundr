server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite fingerprints filenames under /assets, so these are safe to cache
    # aggressively — a new build gets new filenames, not a cache hit on stale JS
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
