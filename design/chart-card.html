<!doctype html><html><head><meta charset="utf-8"><title>Combo chart card</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #2563eb; --primary-dark: #1e40af; --primary-light: #3b82f6;
    --secondary: #7c3aed; --background: #0f172a; --surface: #1e293b;
    --surface-light: #334155; --text: #f8fafc; --text-secondary: #94a3b8;
    --success: #22c55e; --error: #ef4444; --border: #475569;
    --radius: 8px; --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--background); color: var(--text); line-height: 1.6; padding: 1.5rem; }
  .btn { padding: 0.75rem 1.5rem; border: none; border-radius: var(--radius); font-size: 0.95rem;
    font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center;
    justify-content: center; gap: 0.5rem; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
  .btn-secondary { background: var(--surface-light); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-active { background: var(--primary-dark); color: white; border-color: var(--primary-dark); }
  .btn-sm { padding: 0.5rem 1rem; font-size: 0.875rem; }
  .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
  .link-button { background: none; border: none; color: var(--primary-light); cursor: pointer;
    font-size: inherit; padding: 0; text-decoration: underline; }

  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 1rem 1.25rem; }
  .chart-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.75rem; }
  .chart-body { position: relative; }
  .chart-legend { display: flex; gap: 1.25rem; justify-content: center; margin-top: 0.4rem; }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; color: var(--text-secondary); font-size: 0.8rem; }
  .legend-swatch-bar { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  .legend-swatch-line { width: 14px; height: 2px; border-radius: 1px; display: inline-block; }
  .chart-tooltip { position: absolute; top: -4px; transform: translateX(-50%); background: var(--surface-light);
    border: 1px solid var(--border); border-radius: 6px; padding: 0.3rem 0.6rem; display: flex; gap: 0.5rem;
    align-items: center; font-size: 0.8rem; white-space: nowrap; }
  .tt-date { color: var(--text-secondary); }
  .tt-val { display: flex; align-items: center; gap: 0.35rem; font-weight: 600; }
  .tt-sw { width: 8px; height: 8px; border-radius: 2px; display: inline-block; }
  .tt-line { height: 2px; border-radius: 1px; }
</style></head><body>

<div class="chart-card" style="max-width:600px">
  <h4 class="chart-title">Games &amp; blunder rate</h4>
  <div class="chart-body">
  <svg viewBox="0 0 560 200" style="width:100%;display:block">
    <line x1="34" x2="522" y1="100" y2="100" stroke="#475569" stroke-width="1" stroke-dasharray="3 4" opacity="0.5"/>
    <line x1="34" x2="522" y1="10" y2="10" stroke="#475569" stroke-width="1" stroke-dasharray="3 4" opacity="0.5"/>
    <line x1="34" x2="522" y1="166" y2="166" stroke="#475569" stroke-width="1"/>
    <text x="28" y="103" text-anchor="end" fill="#94a3b8" font-size="10">10</text>
    <text x="28" y="13" text-anchor="end" fill="#94a3b8" font-size="10">20</text>
    <text x="528" y="103" fill="#94a3b8" font-size="10">1</text>
    <text x="528" y="13" fill="#94a3b8" font-size="10">2</text>
    <g fill="#3987e5" opacity="0.9">
      <rect x="330" y="60" width="12" height="106" rx="4"/><rect x="350" y="88" width="12" height="78" rx="4"/>
      <rect x="370" y="120" width="12" height="46" rx="4"/><rect x="410" y="30" width="12" height="136" rx="4"/>
      <rect x="430" y="96" width="12" height="70" rx="4"/><rect x="470" y="140" width="12" height="26" rx="4"/>
    </g>
    <polyline points="336,120 356,90 376,128 416,86 436,110 476,72" fill="none" stroke="#1e293b" stroke-width="4" opacity="0.6"/>
    <polyline points="336,120 356,90 376,128 416,86 436,110 476,72" fill="none" stroke="#e66767" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="416" cy="86" r="4.5" fill="#e66767" stroke="#1e293b" stroke-width="2"/>
    <text x="336" y="182" text-anchor="middle" fill="#94a3b8" font-size="10">Jul 2</text>
    <text x="476" y="182" text-anchor="middle" fill="#94a3b8" font-size="10">Jul 9</text>
  </svg>
  <div class="chart-legend">
    <span class="legend-item"><span class="legend-swatch-bar" style="background:#3987e5"></span>Games analyzed</span>
    <span class="legend-item"><span class="legend-swatch-line" style="background:#e66767"></span>Blunders per game</span>
  </div>
  <div class="chart-tooltip" style="left:74%"><span class="tt-date">Jul 8</span>
    <span class="tt-val"><span class="tt-sw" style="background:#3987e5"></span>17</span>
    <span class="tt-val"><span class="tt-sw tt-line" style="background:#e66767"></span>0.6</span></div>
  </div>
</div>

</body></html>
