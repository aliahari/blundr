<!doctype html><html><head><meta charset="utf-8"><title>Sync bar states</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #2563eb; --primary-dark: #1e40af; --primary-light: #3b82f6;
    --secondary: #7c3aed; --background: #0f172a; --surface: #1e293b;
    --surface-light: #334155; --text: #f8fafc; --text-secondary: #94a3b8;
    --success: #22c55e; --error: #ef4444; --border: #475569;
    --radius: 8px; --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--background); color: var(--text); line-height: 1.6; padding: 1.5rem; }
  .btn { padding: 0.75rem 1.5rem; border: none; border-radius: var(--radius); font-size: 0.95rem;
    font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center;
    justify-content: center; gap: 0.5rem; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
  .btn-secondary { background: var(--surface-light); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-active { background: var(--primary-dark); color: white; border-color: var(--primary-dark); }
  .btn-sm { padding: 0.5rem 1rem; font-size: 0.875rem; }
  .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
  .link-button { background: none; border: none; color: var(--primary-light); cursor: pointer;
    font-size: inherit; padding: 0; text-decoration: underline; }

  .sync-bar { display: flex; align-items: center; gap: 1rem; min-height: 2.25rem; margin-bottom: 0.75rem; }
  .sync-progress { max-width: 320px; }
  .progress-bar { flex: 1; height: 8px; background: var(--surface-light); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); }
  .progress-label, .sync-status-text { color: var(--text-secondary); font-size: 0.9rem; }
</style></head><body>

<div class="sync-bar"><div class="progress-bar sync-progress"><div class="progress-fill" style="width:62%"></div></div>
  <span class="progress-label">Syncing… 53/85 games · 31 new blunders</span></div>
<div class="sync-bar"><span class="sync-status-text">✅ Synced 12 new games, found 9 blunders</span>
  <button class="btn btn-secondary btn-sm">↻ Sync now</button></div>
<div class="sync-bar"><span class="sync-status-text">Last synced 2h ago</span>
  <button class="btn btn-secondary btn-sm">↻ Sync now</button></div>
<div class="sync-bar"><span class="sync-status-text">✅ Up to date</span>
  <button class="btn btn-secondary btn-sm" disabled>Syncing…</button></div>

</body></html>
