<!doctype html><html><head><meta charset="utf-8"><title>Form elements</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #2563eb; --primary-dark: #1e40af; --primary-light: #3b82f6;
    --secondary: #7c3aed; --background: #0f172a; --surface: #1e293b;
    --surface-light: #334155; --text: #f8fafc; --text-secondary: #94a3b8;
    --success: #22c55e; --error: #ef4444; --border: #475569;
    --radius: 8px; --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--background); color: var(--text); line-height: 1.6; padding: 1.5rem; }
  .btn { padding: 0.75rem 1.5rem; border: none; border-radius: var(--radius); font-size: 0.95rem;
    font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center;
    justify-content: center; gap: 0.5rem; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
  .btn-secondary { background: var(--surface-light); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-active { background: var(--primary-dark); color: white; border-color: var(--primary-dark); }
  .btn-sm { padding: 0.5rem 1rem; font-size: 0.875rem; }
  .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
  .link-button { background: none; border: none; color: var(--primary-light); cursor: pointer;
    font-size: inherit; padding: 0; text-decoration: underline; }

  .form-card { background: var(--surface); border-radius: var(--radius); padding: 2rem;
    box-shadow: var(--shadow); border: 1px solid var(--border); }
  .form-title { font-size: 1.5rem; margin-bottom: 1.5rem; }
  .form-group { margin-bottom: 1.5rem; }
  .form-group label, .button-group-label { display: block; margin-bottom: 0.5rem;
    color: var(--text-secondary); font-weight: 500; }
  .input { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface-light); color: var(--text); font-size: 1rem; }
  .input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }
  .button-group { display: flex; flex-wrap: wrap; gap: 0.75rem; }
  .error-message { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--error);
    padding: 1rem; border-radius: var(--radius); text-align: center; margin-bottom: 0.75rem; }
  .saved-message { color: var(--success); padding: 0.5rem 0; font-size: 0.9rem; }
  .submit-btn { width: 100%; padding: 1rem; font-size: 1.1rem; margin-top: 1rem; }
</style></head><body>

<div class="form-card" style="max-width:420px">
  <h2 class="form-title">Log In</h2>
  <div class="form-group"><label>Username</label><input class="input" value="magnus"/></div>
  <div class="form-group"><label>Password (min 8 characters)</label><input class="input" type="password" value="secret123"/></div>
  <div class="form-group"><span class="button-group-label">Game types to fetch</span>
    <div class="button-group">
      <button class="btn btn-secondary">Bullet</button>
      <button class="btn btn-secondary btn-active">Blitz</button>
      <button class="btn btn-secondary btn-active">Rapid</button>
      <button class="btn btn-secondary">Classical</button>
    </div></div>
  <div class="error-message">Couldn't find a Lichess user named "magnos". Check the spelling.</div>
  <div class="saved-message">✅ Settings saved</div>
  <button class="btn btn-primary submit-btn">Register</button>
</div>

</body></html>
