<!doctype html><html><head><meta charset="utf-8"><title>Top nav</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #2563eb; --primary-dark: #1e40af; --primary-light: #3b82f6;
    --secondary: #7c3aed; --background: #0f172a; --surface: #1e293b;
    --surface-light: #334155; --text: #f8fafc; --text-secondary: #94a3b8;
    --success: #22c55e; --error: #ef4444; --border: #475569;
    --radius: 8px; --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--background); color: var(--text); line-height: 1.6; padding: 1.5rem; }
  .btn { padding: 0.75rem 1.5rem; border: none; border-radius: var(--radius); font-size: 0.95rem;
    font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center;
    justify-content: center; gap: 0.5rem; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
  .btn-secondary { background: var(--surface-light); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-active { background: var(--primary-dark); color: white; border-color: var(--primary-dark); }
  .btn-sm { padding: 0.5rem 1rem; font-size: 0.875rem; }
  .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
  .link-button { background: none; border: none; color: var(--primary-light); cursor: pointer;
    font-size: inherit; padding: 0; text-decoration: underline; }

  body { padding: 0; }
  .topnav { display: flex; align-items: center; gap: 2rem; padding: 0.75rem 2rem;
    border-bottom: 1px solid var(--border); background: var(--surface); }
  .topnav-brand h1 { font-size: 1.5rem; background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .topnav-tabs { display: flex; gap: 0.25rem; flex: 1; }
  .tab { background: none; border: none; color: var(--text-secondary); font-size: 1rem; font-weight: 600;
    padding: 0.75rem 1.25rem; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab-active { color: var(--primary-light); border-bottom-color: var(--primary); }
  .topnav-user { display: flex; align-items: center; gap: 1rem; }
  .topnav-profile { display: flex; align-items: center; gap: 0.5rem; background: none;
    border: 1px solid transparent; border-radius: var(--radius); padding: 0.35rem 0.6rem;
    cursor: pointer; color: var(--text); }
  .topnav-profile:hover { border-color: var(--border); background: var(--surface-light); }
  .topnav-name { font-weight: 500; font-size: 0.9rem; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--primary-dark); color: white;
    display: inline-flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.85rem; }
</style></head><body>

<header class="topnav">
  <div class="topnav-brand"><h1>Blundr</h1></div>
  <nav class="topnav-tabs">
    <button class="tab tab-active">Dashboard</button>
    <button class="tab">Learn</button>
  </nav>
  <div class="topnav-user">
    <button class="topnav-profile"><span class="avatar"><span>A</span></span>
      <span class="topnav-name">Ali A.</span><span class="topnav-gear">⚙️</span></button>
    <button class="link-button">Log out</button>
  </div>
</header>

</body></html>
